name: Build Integration Branch

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened, closed]

permissions:
  contents: write
  pull-requests: read

jobs:
  build-integration:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build integration branch
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # List open non-draft PRs
          prs=$(gh pr list --state open --json number,headRefName,isDraft --jq '[.[] | select(.isDraft == false)]')
          count=$(echo "$prs" | jq length)

          if [ "$count" -eq 0 ]; then
            echo "No eligible (non-draft) PRs found. Skipping."
            echo "## Integration Branch" >> "$GITHUB_STEP_SUMMARY"
            echo "No open non-draft PRs to merge." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          echo "Found $count eligible PR(s)"

          # Reset integration branch from main
          git checkout -B integration origin/main

          merged=()
          conflicted=()

          for row in $(echo "$prs" | jq -r '.[] | @base64'); do
            number=$(echo "$row" | base64 --decode | jq -r '.number')
            branch=$(echo "$row" | base64 --decode | jq -r '.headRefName')

            echo "--- Merging PR #$number ($branch) ---"
            git fetch origin "pull/$number/head:pr-$number"

            if git merge --no-ff "pr-$number" -m "Merge PR #$number ($branch)"; then
              echo "Merged PR #$number"
              merged+=("$number:$branch")
            else
              echo "Conflict merging PR #$number — skipping"
              git merge --abort
              conflicted+=("$number:$branch")
            fi
          done

          # Push the integration branch
          git push --force origin integration

          # Write job summary
          {
            echo "## Integration Branch"
            echo ""
            echo "Built \`integration\` from \`main\` with **${#merged[@]}** PR(s) merged."
            echo ""

            if [ ${#merged[@]} -gt 0 ]; then
              echo "### Merged"
              for entry in "${merged[@]}"; do
                num="${entry%%:*}"
                br="${entry#*:}"
                echo "- PR #$num (\`$br\`)"
              done
              echo ""
            fi

            if [ ${#conflicted[@]} -gt 0 ]; then
              echo "### Conflicted (skipped)"
              for entry in "${conflicted[@]}"; do
                num="${entry%%:*}"
                br="${entry#*:}"
                echo "- PR #$num (\`$br\`)"
              done
              echo ""
            fi
          } >> "$GITHUB_STEP_SUMMARY"
